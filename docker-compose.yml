services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ktpdb
      POSTGRES_USER: ktpuser
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ktpuser -d ktpdb"]
      interval: 5s
      timeout: 5s
      retries: 20

  # Runs once on first boot to create/update all database tables, then exits
  db-migrate:
    build:
      context: .
      dockerfile: docker/Dockerfile.migrate
    restart: "no"
    environment:
      DATABASE_URL: postgresql://ktpuser:${DB_PASSWORD}@postgres:5432/ktpdb
    depends_on:
      postgres:
        condition: service_healthy

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile.api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 8080
      DATABASE_URL: postgresql://ktpuser:${DB_PASSWORD}@postgres:5432/ktpdb
      SESSION_SECRET: ${SESSION_SECRET}
      GROQ_API_KEY: ${GROQ_API_KEY}
    volumes:
      - ktp_uploads:/app/ktp-uploads
    depends_on:
      postgres:
        condition: service_healthy
      db-migrate:
        condition: service_completed_successfully
    expose:
      - "8080"

  telegram-bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
      args:
        BOT_PACKAGE: telegram-bot
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ktpuser:${DB_PASSWORD}@postgres:5432/ktpdb
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  report-bot:
    build:
      context: .
      dockerfile: docker/Dockerfile.bot
      args:
        BOT_PACKAGE: report-bot
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://ktpuser:${DB_PASSWORD}@postgres:5432/ktpdb
      TELEGRAM_REPORT_BOT_TOKEN: ${TELEGRAM_REPORT_BOT_TOKEN}
      REPORT_CHAT_ID: ${REPORT_CHAT_ID}
    depends_on:
      db-migrate:
        condition: service_completed_successfully

  dashboard:
    build:
      context: .
      dockerfile: docker/Dockerfile.dashboard
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  pgdata:
  ktp_uploads:
