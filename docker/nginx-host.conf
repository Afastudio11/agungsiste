server {
    listen 80;
    server_name astinv.cloud www.astinv.cloud;
    return 301 https://$host$request_uri;
}
server {
    listen 443 ssl;
    server_name astinv.cloud www.astinv.cloud;
    ssl_certificate /etc/letsencrypt/live/astinv.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/astinv.cloud/privkey.pem;
    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
    }
}
